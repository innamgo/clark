<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Explorer Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Database Schema -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                    <h2 style="margin-bottom: 0;">Data Sources</h2>
                    <button class="icon-btn primary" id="btn-add-source" title="Add Data Source">+</button>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search tables or columns..." id="schema-search">
                </div>
            </div>
            <div class="schema-tree" id="schema-tree">
                <!-- Schema items will be generated by JS -->
            </div>
        </aside>

        <!-- Main Query Builder Area -->
        <main class="builder-area">
            <header class="builder-header">
                <h1>Untitled Query</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="btn-clear">Clear</button>
                    <button class="btn btn-primary" id="btn-run">Run Query</button>
                </div>
            </header>

            <div class="query-dropzones">
                <!-- Selected Columns (Dimensions, Measures) -->
                <div class="dropzone-container">
                    <h3>Selected Columns</h3>
                    <div class="dropzone" id="dz-columns" data-type="column">
                        <div class="empty-state">Drag and drop columns here</div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="dropzone-container is-filter">
                    <h3>Filters</h3>
                    <div class="dropzone" id="dz-filters" data-type="filter">
                        <div class="empty-state">Drag and drop columns to filter</div>
                    </div>
                </div>
            </div>

            <!-- Data Preview / Results -->
            <div class="results-area">
                <div class="results-header">
                    <h3>Data Preview</h3>
                    <span class="results-meta" id="results-meta"></span>
                </div>
                <div class="table-container">
                    <table class="results-table" id="results-table">
                        <thead id="results-thead">
                            <!-- Table headers generated by JS -->
                        </thead>
                        <tbody id="results-tbody">
                            <tr>
                                <td colspan="100%" class="empty-table-state">
                                    Run a query to see results
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Filter Modal/Popover Template -->
    <div id="filter-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="filter-modal-title">Filter Config</h3>
                <button class="close-btn" id="close-filter-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Operator</label>
                    <select id="filter-operator-select">
                        <option value="equals">Equals</option>
                        <option value="not_equals">Does Not Equal</option>
                        <option value="contains">Contains</option>
                        <option value="greater_than">Greater Than</option>
                        <option value="less_than">Less Than</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Value</label>
                    <input type="text" id="filter-value-input" placeholder="Enter value">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-filter-btn" style="margin-right: 0.5rem;">Cancel</button>
                <button class="btn btn-primary" id="save-filter-btn">Apply</button>
            </div>
        </div>
    </div>

    <!-- Data Source Modal -->
    <div id="source-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 id="source-modal-title">Add Data Source</h3>
                <button class="close-btn" id="close-source-modal">&times;</button>
            </div>
            <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
                <input type="hidden" id="source-id-input">
                <div class="form-group">
                    <label>Source Name</label>
                    <input type="text" id="source-name" placeholder="e.g. Production PostgreSQL">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>DB Type</label>
                        <select id="source-type">
                            <option value="postgresql">PostgreSQL</option>
                            <option value="mysql">MySQL</option>
                            <option value="redshift">Redshift</option>
                            <option value="snowflake">Snowflake</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>DB Name</label>
                        <input type="text" id="source-dbname" placeholder="main_db">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Host</label>
                        <input type="text" id="source-host" placeholder="localhost">
                    </div>
                    <div class="form-group">
                        <label>Port</label>
                        <input type="number" id="source-port" placeholder="5432">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="source-user" placeholder="root">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="source-pass" placeholder="••••••••">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tables / Views (Comma separated)</label>
                    <input type="text" id="source-tables-input" placeholder="e.g. users, sales_data_view">
                </div>
                <div class="form-group">
                    <label style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="color:red">Mock Features: </span> Table Schema (JSON)
                        <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" id="btn-load-sample">Load Sample JSON</button>
                    </label>
                    <textarea id="source-schema-json" rows="6" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: monospace; font-size: 0.75rem;" placeholder='[{"name":"Table1","columns":[{"name":"id","type":"integer"}]}]'></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-source-btn" style="margin-right: 0.5rem;">Cancel</button>
                <button class="btn btn-primary" id="save-source-btn">Save Data Source</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=20240325b"></script>
</body>
</html>
